services:
  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chatapp-postgres
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── gRPC Chat Server ────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: chatapp-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatapp
      SPRING_DATASOURCE_USERNAME: chatapp
      SPRING_DATASOURCE_PASSWORD: chatapp

  # ── Interactive Chat Client ─────────────────────────────────────
  # Usage: docker compose run client
  # For multiple users, run in separate terminals:
  #   docker compose run client
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    stdin_open: true
    tty: true
    environment:
      GRPC_SERVER_HOST: server
      GRPC_SERVER_PORT: "9090"

volumes:
  pgdata:
